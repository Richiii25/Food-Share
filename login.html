<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Food Share</title>
    <style>
        /* Base styles matching the main page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: #ffffff;
            text-align: center;
            padding: 2rem 1rem;
        }

        main {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px; /* Slightly narrower for a login form */
            width: 100%;
        }

        .card h2 {
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        
        .card p {
            margin-bottom: 1.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        /* Form Styling */
        form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #2c3e50;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button {
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem;
            font-size: 1rem;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background-color: #2980b9;
        }

        .redirect-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .redirect-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .redirect-link a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #2c3e50;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Food Share</h1>
    </header>
    
    <main>
        <section class="card">
            <h2>Welcome Back</h2>
            <p>Log in to continue saving food.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit">Log In</button>
            </form>

            <div class="redirect-link">
                Don't have an account? <a href="signup.html">Sign up here</a><br>
                <br>
                <a href="main.html">&larr; Back to Home</a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');

            loginForm.addEventListener('submit', (event) => {
                // Prevent the form from refreshing the page immediately
                event.preventDefault();
                
                const emailInput = document.getElementById('email').value;
                
                // Show a success message
                alert(`Login successful! Redirecting to your dashboard...`);
                
                // Redirect the user to the dashboard page
                window.location.href = 'dashboard.html';
            });
        });
    </script>
</body>
</html>
