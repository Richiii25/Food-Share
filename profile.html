<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Food Share</title>
    <style>
        /* Base styles matching the previous pages */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: #3498db;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid white;
            padding: 0.4rem 0.8rem;
            margin-left: 1.5rem;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background-color: white;
            color: #2c3e50;
        }

        /* Profile Layout */
        main {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .profile-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f4f4f9;
            padding-bottom: 1.5rem;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3498db;
            background-color: #e8f4f8;
        }

        .upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }

        .upload-btn:hover {
            background-color: #3498db;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .save-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem;
            font-size: 1rem;
            border: none;
            background-color: #27ae60;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        .save-btn:hover {
            background-color: #219653;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #2c3e50;
            color: #ffffff;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Food Share</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html" class="active">My Profile</a>
            <button id="logout-btn" class="logout-btn">Log Out</button>
        </nav>
    </header>
    
    <main>
        <section class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="https://via.placeholder.com/120?text=Avatar" alt="Profile Picture" class="avatar" id="profile-img">
                    <button class="upload-btn" title="Upload new picture">+</button>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                </div>
                <h2>Edit Profile</h2>
            </div>
            
            <form id="profile-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" value="Richy Lima" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="13" max="120" placeholder="e.g. 25" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="sex">Sex</label>
                        <select id="sex" name="sex" required>
                            <option value="" disabled>Select...</option>
                            <option value="male" selected>Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other / Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="goal">Your Food Share Goal</label>
                    <textarea id="goal" name="goal" placeholder="What do you hope to achieve here?">To help reduce food waste in my community and ensure extra meals go to those who need them.</textarea>
                </div>
                
                <button type="submit" class="save-btn">Save Changes</button>
            </form>
        </section>
    </main>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Navigation Logic (Logout)
            const logoutBtn = document.getElementById('logout-btn');
            logoutBtn.addEventListener('click', () => {
                if (confirm("Are you sure you want to log out?")) {
                    window.location.href = 'index.html';
                }
            });

            // 2. Profile Form Submission
            const profileForm = document.getElementById('profile-form');
            profileForm.addEventListener('submit', (event) => {
                event.preventDefault();
                
                // Get updated values
                const updatedName = document.getElementById('fullName').value;
                
                alert(`Profile saved successfully! Looking good, ${updatedName}.`);
            });

            // 3. Simple Image Upload Interaction
            const uploadBtn = document.querySelector('.upload-btn');
            const imageUploadInput = document.getElementById('image-upload');
            const profileImg = document.getElementById('profile-img');

            uploadBtn.addEventListener('click', () => {
                // Triggers the hidden file input
                imageUploadInput.click();
            });

            imageUploadInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (file) {
                    // Create a temporary URL to preview the uploaded image
                    const imageUrl = URL.createObjectURL(file);
                    profileImg.src = imageUrl;
                }
            });
        });
    </script>
</body>
</html>
