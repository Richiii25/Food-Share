<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Food Share</title>
    <style>
        /* Base styles matching the previous pages */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Updated Header with Navigation */
        header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #3498db;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid white;
            padding: 0.4rem 0.8rem;
            margin-left: 1.5rem;
        }

        .logout-btn:hover {
            background-color: white;
            color: #2c3e50;
        }

        /* Dashboard Layout */
        main {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            max-width: 900px;
            width: 100%;
        }

        .welcome-section {
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        /* Grid for Impact Statistics */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-top: 4px solid #3498db;
        }

        .stat-card h3 {
            font-size: 2.5rem;
            color: #3498db;
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            color: #666;
            font-weight: 600;
        }

        /* Action Panel */
        .action-panel {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .action-panel h2 {
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background-color: #2980b9;
        }

        .btn-green { background-color: #27ae60; }
        .btn-green:hover { background-color: #219653; }

        .btn-orange { background-color: #f39c12; }
        .btn-orange:hover { background-color: #d68910; }

        /* Recent Activity List */
        .activity-feed {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .activity-feed h2 {
            margin-bottom: 1rem;
            color: #2c3e50;
            border-bottom: 2px solid #f4f4f9;
            padding-bottom: 0.5rem;
        }

        .activity-item {
            padding: 1rem 0;
            border-bottom: 1px solid #f4f4f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-date {
            color: #999;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #2c3e50;
            color: #ffffff;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Food Share</h1>
        <nav>
            <a href="profile.html">My Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button id="logout-btn" class="logout-btn">Log Out</button>
        </nav>
    </header>

    <main>
        <div class="settings-container">
            <h2>Account Settings</h2>
            <form id="settings-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </main>


</body>
</html>

</html>
